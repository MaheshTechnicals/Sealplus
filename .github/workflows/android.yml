name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4

    - uses: gradle/actions/setup-gradle@v4
      with:
        build-scan-publish: true
        build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
        build-scan-terms-of-use-agree: "yes"

    # --- NAYA STEP: Keystore Decode Karna ---
    - name: Decode Keystore
      env:
        ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
      run: |
        echo "? Decoding Key..."
        echo "$ANDROID_SIGNING_KEY" | tr -d '\n\r ' | base64 --decode > "${{ github.workspace }}/Mahesh.jks"

    # --- UPDATED STEP: Fast Build aur Native Signing Ek Sath ---
    - name: Build and Sign Release APKs
      env:
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_ALIAS: ${{ secrets.ANDROID_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        ./gradlew assembleRelease --parallel --build-cache --no-daemon \
          -Pandroid.injected.signing.store.file="${{ github.workspace }}/Mahesh.jks" \
          -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
          -Pandroid.injected.signing.key.alias="$ANDROID_ALIAS" \
          -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

    - name: Get version name
      id: version
      run: |
        VERSION=$(grep -A 1 'val currentVersion: Version =' buildSrc/src/main/kotlin/Version.kt | grep -oP 'versionMajor = \K\d+' | head -1).$(grep -A 1 'val currentVersion: Version =' buildSrc/src/main/kotlin/Version.kt | grep -oP 'versionMinor = \K\d+' | head -1).$(grep -A 1 'val currentVersion: Version =' buildSrc/src/main/kotlin/Version.kt | grep -oP 'versionPatch = \K\d+' | head -1)
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION}"

    - name: Read release configuration
      id: release_config
      run: |
        SHOULD_RELEASE=$(jq -r '.release' release.json)
        echo "SHOULD_RELEASE=${SHOULD_RELEASE}" >> $GITHUB_OUTPUT
        echo "Release flag: ${SHOULD_RELEASE}"
        if [ "${SHOULD_RELEASE}" = "true" ]; then
          echo "? Release will be published"
        else
          echo "?? Release publishing is disabled - APKs will be uploaded as artifacts only"
        fi

    - name: List all APK files for debugging
      run: |
        echo "? All APK files in output directory:"
        find app/build/outputs/apk -name "*.apk" -type f -exec ls -lh {} \;
        echo ""
        echo "? Directory structure:"
        ls -R app/build/outputs/apk/

    - name: Create Release
      if: steps.release_config.outputs.SHOULD_RELEASE == 'true'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: Seal Plus v${{ steps.version.outputs.VERSION }}
        body: |
          ## ✨ Seal Plus v2.9.0 - Cookies Overhaul, Download Docs, Anti-Bot Detection, MP4 Filter
          
          ---
          
          ### 🍪 Manual Cookie Paste Dialog
          
          * **Full Cookie Paste Interface** — Paste cookies manually in Netscape (.txt), JSON (Cookie-Editor), or Cookie Header (name=value) format
          * **Import Options** — Paste from clipboard or import from a local .txt/.json file
          * **Smart Validation** — Confirm button disabled until valid URL and non-empty cookie text
          * **Priority** — Manually pasted cookies used first, skipping CookieManager
          
          ### ⚠️ Facebook/Instagram Account Ban Warning
          
          * Red warning callout inside the paste dialog — warns personal account cookies may get banned
          * Recommends using a throwaway/secondary account for downloading
          
          ### 🛡️ Anti-Bot Detection for Meta Login Pages
          
          * **Two-Layer Bypass** — Sec-CH-UA header spoofing + JavaScript runtime shims
          * Replaces "Android WebView" brand with "Google Chrome" in browser hints
          * Shims `window.chrome`, disables `navigator.webdriver`, patches `userAgentData.brands`
          
          ### 🔄 Multi-Window Popup Support
          
          * `window.open()` / `target="_blank"` popups render as closeable overlay inside the app
          * Back button closes popup first, then navigates WebView back
          
          ### 🔐 Cookie Management Rewrite
          
          * **Storage Rewrite** — Switched from direct SQLite to `CookieManager.getCookie()` API
          * **HttpOnly & Expiry** — Cookies track HttpOnly flag; expired cookies auto-skipped
          * **Auto-Refresh** — Cookies refresh on screen resume via lifecycle observer
          * **Deduplication** — Cross-profile deduplication by `domain|name`
          
          ### 📄 Download Documentation Feature
          
          * **Save Video Metadata** — New "Download Docs" saves title, uploader, date, duration, URL, tags, description as .txt
          * Saved to `SealPlus/docs/` after download completes with success toast
          * Toggle without selecting format to save docs only (no video download)
          
          ### 🔧 Download Resilience & Retry
          
          * **Retry Settings** — `--retries=10`, `--fragment-retries=10`, `--extractor-retries=3`, `--file-access-retries=3`
          * **Exponential Backoff** — HTTP `exp=1:120`, fragment `exp=1:60` to prevent rate-limit issues
          * **Extended Timeouts** — Socket timeout 5s→15s, info-probe retries 1→3
          * **Aria2c** — Protocol scoping, `--file-allocation=none`, `--max-tries=5`, `--retry-wait=2`
          * **Concurrent Fragments** now works alongside aria2c
          
          ### 🎬 Format Selection
          
          * **MP4-Only Filter** — Show only MP4/M4A formats; enabled by default
          * **Coil 3 OkHttp** — Desktop Chrome User-Agent for reliable thumbnail loading
          * **Implausible Size Filter** — Removes formats with unrealistically low bitrates
          
          ### 🎨 UI Polish
          
          * **Download Dialog V2** — verticalScroll layout, pill-shaped FilterChips, FlowRow settings, animated ExpandableTitle, segmented download type selector
          * **Battery Optimization** — OEM detection for 8 manufacturers, manufacturer-specific intents, persistent dialog dismissal, Xiaomi HyperOS/MIUI targets
          
          ---
          
          ### 📦 Installation
          
          Download the appropriate APK for your device:
          - **Universal APK**: Works on all devices (recommended)
          - **arm64-v8a**: For 64-bit ARM devices (most modern phones)
          - **armeabi-v7a**: For 32-bit ARM devices
          - **x86_64**: For 64-bit x86 devices
          - **x86**: For 32-bit x86 devices
          
          ### ✨ Key Features (v2.9)
          - 🍪 **Manual Cookie Paste** - 3 formats, clipboard/file import, smart validation
          - ⚠️ **Account Ban Warning** - Safety notice for Facebook/Instagram cookies
          - 🛡️ **Anti-Bot Detection** - Two-layer bypass for Meta login pages
          - 🔄 **Multi-Window Popups** - Login popups handled inside the app
          - 🔐 **Cookie Management Rewrite** - HttpOnly/expiry, auto-refresh, deduplication
          - 📄 **Download Docs** - Save video metadata as text file
          - 🔧 **Download Resilience** - Retry settings, exponential backoff, extended timeouts
          - 🎬 **MP4-Only Filter** - Filter formats by MP4 compatibility
          - 🎨 **Download Dialog Redesign** - Modern pill chips, animated sections
          - 🔋 **Battery Optimization** - OEM-specific handling, persistent dismissal
          
          ### 📜 Full Changelog
          See [CHANGELOG.md](https://github.com/MaheshTechnicals/Sealplus/blob/main/CHANGELOG.md) for complete version history.
          
          ---
          
          Built on: ${{ github.event.head_commit.timestamp }}
          Commit: ${{ github.sha }}
        draft: false
        prerelease: false
        make_latest: true
        files: |
          app/build/outputs/apk/generic/release/*.apk

    - name: Send Telegram Notification to Channel
      if: steps.release_config.outputs.SHOULD_RELEASE == 'true'
      continue-on-error: true
      env:
        TGTOKEN: ${{ secrets.TGTOKEN }}
        TGCHANNEL: ${{ secrets.TGCHANNEL }}
      run: |
        # Skip if Telegram credentials are not configured
        if [ -z "$TGTOKEN" ] || [ -z "$TGCHANNEL" ]; then
          echo "?? Telegram notification skipped (TGTOKEN or TGCHANNEL not configured)"
          exit 0
        fi
        
        echo "? Sending notification to Telegram Channel: $TGCHANNEL"
        
        # Prepare the release URL
        RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.VERSION }}"
        
        # Create a beautiful Telegram message with HTML formatting
        MESSAGE="<b>🎉 New Release Available!</b> 🚀\n\n"
        MESSAGE+="━━━━━━━━━━━━━━━━━━━━━━━\n\n"
        MESSAGE+="📱 <b>App Name:</b> Seal Plus\n\n"
        MESSAGE+="🏷️ <b>Version:</b> v${{ steps.version.outputs.VERSION }}\n\n"
        MESSAGE+="━━━━━━━━━━━━━━━━━━━━━━━\n\n"
MESSAGE+="📋 <b>Changelog (v2.9):</b>\n\n"
        MESSAGE+="<b>🍪 Manual Cookie Paste Dialog</b>\n"
        MESSAGE+="  ➤ Paste cookies in 3 formats: Netscape, JSON, Cookie Header\n"
        MESSAGE+="  ➤ Import from clipboard or from local file\n"
        MESSAGE+="  ➤ Smart validation — confirm disabled until valid URL + non-empty text\n"
        MESSAGE+="  ➤ Manual cookies take priority over browser cookies\n\n"
        MESSAGE+="<b>⚠️ Account Ban Warning</b>\n"
        MESSAGE+="  ➤ Warning callout for Facebook/Instagram personal cookies\n"
        MESSAGE+="  ➤ Recommends using throwaway/secondary account\n\n"
        MESSAGE+="<b>🛡️ Anti-Bot Detection (Meta Login)</b>\n"
        MESSAGE+="  ➤ Two-layer bypass: Sec-CH-UA header spoofing + JS shims\n"
        MESSAGE+="  ➤ Hides WebView identity from Facebook/Instagram\n\n"
        MESSAGE+="<b>🔄 Multi-Window Popups</b>\n"
        MESSAGE+="  ➤ Login popups render as closeable overlay inside app\n"
        MESSAGE+="  ➤ Back button: popup → navigate → dismiss\n\n"
        MESSAGE+="<b>🔐 Cookie Management Rewrite</b>\n"
        MESSAGE+="  ➤ SQLite → CookieManager.getCookie() API\n"
        MESSAGE+="  ➤ HttpOnly tracking, expired cookies auto-skipped\n"
        MESSAGE+="  ➤ Auto-refresh on screen resume, deduplication\n\n"
        MESSAGE+="<b>📄 Download Documentation</b>\n"
        MESSAGE+="  ➤ Save video metadata (title, date, URL, tags, description) as .txt\n"
        MESSAGE+="  ➤ Saved to SealPlus/docs/ after download\n\n"
        MESSAGE+="<b>🔧 Download Resilience</b>\n"
        MESSAGE+="  ➤ Retry settings: 10 retries, 3 extractor retries, exponential backoff\n"
        MESSAGE+="  ➤ Socket timeout 5s→15s, info-probe retries 1→3\n"
        MESSAGE+="  ➤ Aria2c protocol scoping, concurrent fragments support\n\n"
        MESSAGE+="<b>🎬 Format Selection</b>\n"
        MESSAGE+="  ➤ MP4-only filter (default on)\n"
        MESSAGE+="  ➤ Coil 3 OkHttp with desktop Chrome UA for thumbnails\n"
        MESSAGE+="  ➤ Implausible size filter for unrealistic bitrates\n\n"
        MESSAGE+="<b>🎨 UI Polish</b>\n"
        MESSAGE+="  ➤ Download dialog V2: pill FilterChips, FlowRow, animated sections\n"
        MESSAGE+="  ➤ Battery: OEM detection for 8 brands, persistent dismissal\n"
        MESSAGE+="  ➤ Xiaomi HyperOS/MIUI battery intent targets\n\n"
        MESSAGE+="━━━━━━━━━━━━━━━━━━━━━━━\n\n"
        MESSAGE+="✨ <b>Key Features (v2.9):</b>\n"
        MESSAGE+="🍪 Manual Cookie Paste — 3 formats, clipboard/file import\n"
        MESSAGE+="⚠️ Account Ban Warning — safety notice for personal cookies\n"
        MESSAGE+="🛡️ Anti-Bot Detection — two-layer Meta login bypass\n"
        MESSAGE+="🔄 Multi-Window Popups — login popups inside app\n"
        MESSAGE+="🔐 Cookie Rewrite — HttpOnly, expiry, auto-refresh\n"
        MESSAGE+="📄 Download Docs — save video metadata as .txt\n"
        MESSAGE+="🔧 Download Resilience — retry settings, backoff, timeouts\n"
        MESSAGE+="🎬 MP4-Only Filter — filter formats by compatibility\n"
        MESSAGE+="🎨 Download Dialog Redesign — pill chips, animated sections\n"
        MESSAGE+="🔋 Battery Optimization — OEM-specific, persistent dismiss\n"
        MESSAGE+="🌐 1000+ sites via yt-dlp — YouTube, TikTok, Instagram\n\n"
        MESSAGE+="━━━━━━━━━━━━━━━━━━━━━━━\n\n"
        MESSAGE+="💡 <b>Note:</b> v2.9 brings a full Cookies &amp; WebView overhaul with manual cookie paste dialog supporting 3 formats, two-layer anti-bot detection for Meta login pages, multi-window popup support, a rewritten cookie management system (SQLite→CookieManager API, HttpOnly/expiry), Download Documentation feature, enhanced download resilience with exponential backoff, MP4-only format filter, redesigned Download Dialog V2, and OEM-specific battery optimization.\n\n"
        MESSAGE+="🕐 <i>Released: $(date '+%B %d, %Y at %H:%M UTC')</i>"
        
        # URL encode the message to avoid HTML parsing issues
        MESSAGE_ENCODED=$(echo -ne "$MESSAGE" | jq -sRr @uri)
        
        # Send ONLY to Channel
        curl -s -X POST "https://api.telegram.org/bot${TGTOKEN}/sendMessage" \
          -d "chat_id=${TGCHANNEL}" \
          -d "text=${MESSAGE_ENCODED}" \
          -d "parse_mode=HTML" \
          -d "disable_web_page_preview=false" \
          && echo "? Telegram Channel notification sent successfully!" \
          || echo "? Failed to send Telegram notification"

    - name: Upload Universal APK as Artifact
      if: steps.release_config.outputs.SHOULD_RELEASE == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: SealPlus-${{ steps.version.outputs.VERSION }}-universal
        path: app/build/outputs/apk/generic/release/*universal*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Upload arm64-v8a APK as Artifact
      if: steps.release_config.outputs.SHOULD_RELEASE == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: SealPlus-${{ steps.version.outputs.VERSION }}-arm64-v8a
        path: app/build/outputs/apk/generic/release/*arm64-v8a*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Upload armeabi-v7a APK as Artifact
      if: steps.release_config.outputs.SHOULD_RELEASE == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: SealPlus-${{ steps.version.outputs.VERSION }}-armeabi-v7a
        path: app/build/outputs/apk/generic/release/*armeabi-v7a*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Upload x86_64 APK as Artifact
      if: steps.release_config.outputs.SHOULD_RELEASE == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: SealPlus-${{ steps.version.outputs.VERSION }}-x86_64
        path: app/build/outputs/apk/generic/release/*x86_64*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Upload x86 APK as Artifact
      if: steps.release_config.outputs.SHOULD_RELEASE == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: SealPlus-${{ steps.version.outputs.VERSION }}-x86
        path: app/build/outputs/apk/generic/release/*x86*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Upload Artifacts (Backup - Always)
      if: steps.release_config.outputs.SHOULD_RELEASE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: signed-apks-backup
        path: app/build/outputs/apk/generic/release/*.apk
        if-no-files-found: error
        retention-days: 20