name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4

    - uses: gradle/actions/setup-gradle@v4
      with:
        build-scan-publish: true
        build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
        build-scan-terms-of-use-agree: "yes"

    # --- NAYA STEP: Keystore Decode Karna ---
    - name: Decode Keystore
      env:
        ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
      run: |
        echo "? Decoding Key..."
        echo "$ANDROID_SIGNING_KEY" | tr -d '\n\r ' | base64 --decode > "${{ github.workspace }}/Mahesh.jks"

    # --- UPDATED STEP: Fast Build aur Native Signing Ek Sath ---
    - name: Build and Sign Release APKs
      env:
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_ALIAS: ${{ secrets.ANDROID_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        ./gradlew assembleRelease --parallel --build-cache --no-daemon \
          -Pandroid.injected.signing.store.file="${{ github.workspace }}/Mahesh.jks" \
          -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
          -Pandroid.injected.signing.key.alias="$ANDROID_ALIAS" \
          -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

    - name: Get version name
      id: version
      run: |
        VERSION=$(grep -A 1 'val currentVersion: Version =' buildSrc/src/main/kotlin/Version.kt | grep -oP 'versionMajor = \K\d+' | head -1).$(grep -A 1 'val currentVersion: Version =' buildSrc/src/main/kotlin/Version.kt | grep -oP 'versionMinor = \K\d+' | head -1).$(grep -A 1 'val currentVersion: Version =' buildSrc/src/main/kotlin/Version.kt | grep -oP 'versionPatch = \K\d+' | head -1)
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION}"

    - name: Read release configuration
      id: release_config
      run: |
        SHOULD_RELEASE=$(jq -r '.release' release.json)
        echo "SHOULD_RELEASE=${SHOULD_RELEASE}" >> $GITHUB_OUTPUT
        echo "Release flag: ${SHOULD_RELEASE}"
        if [ "${SHOULD_RELEASE}" = "true" ]; then
          echo "? Release will be published"
        else
          echo "?? Release publishing is disabled - APKs will be uploaded as artifacts only"
        fi

    - name: List all APK files for debugging
      run: |
        echo "? All APK files in output directory:"
        find app/build/outputs/apk -name "*.apk" -type f -exec ls -lh {} \;
        echo ""
        echo "? Directory structure:"
        ls -R app/build/outputs/apk/

    - name: Create Release
      if: steps.release_config.outputs.SHOULD_RELEASE == 'true'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: Seal Plus v${{ steps.version.outputs.VERSION }}
        body: |
          ## ✨ Seal Plus v2.8.0 - Settings & About Redesign, Bulk Dependency Update, Website & SEO Overhaul
          
          ---
          
          ### 🎨 Settings & About Page Redesign
          
          * **Full-Width Settings LazyColumn Layout**
              + Settings page redesigned with `PreferenceItem` + trailing chevron icons throughout
              + Visual grouping with spacers between sections
              + Prominent sponsor card with `primaryContainer` color
          
          * **Card-Based About Page Redesign**
              + 2-column grid of `CommunityCard` components
              + Website link to sealplus.in, Auto-Update toggle as standalone Card
              + Version & package name footer caption
          
          ### 🔌 Accompanist → Platform API Migration
          
          * **Permissions**: Replaced accompanist-permissions with `ActivityResultContracts.RequestPermission`
          * **WebView**: Replaced accompanist-webview with platform `AndroidView` + `WebView`
          * **Pager Indicators**: Replaced accompanist-pager-indicators with custom `Row` + `Box` dots
          * Entire accompanist dependency bundle removed
          
          ### 📦 Bulk Dependency Update
          
          * **Gradle 9.5.1 & AGP 9.2.1** — Upgraded from 8.13 / 8.13.2
          * **Kotlin 2.3.21** with K2 Compiler — Upgraded from 2.0.21, KSP 2.3.9
          * **Compose BOM 2026.05.01** — Upgraded from 2025.01.00
          * **Coil 3.4.0** — Migrated from Coil 2 to Coil 3 (`io.coil-kt.coil3`)
          * **Android SDK 37** — compileSdk/targetSdk upgraded to Android 17
          * **Room 2.8.4, Koin 4.2.1, MMKV 1.3.16, Coroutines 1.11.0** — All bumped
          
          ### 🐛 Bug Fixes & Stability
          
          * **LockScreen Biometric Fix** — Repeated prompt prevention, finishing guard
          * **MainActivity LockScreen** — Deferred until after onboarding completes
          * **QuickDownloadActivity** — Early return fix for finishing activity crash
          * **DownloaderV2 Cleanup** — Network callback properly unregistered on crash/low memory
          * **SponsorUtil Leak** — OkHttpClient per-call instead of singleton
          * **DatabaseUtil** — Destructive migration fallback for safety
          * **UpdateUtil** — checkForUpdate now safe with Dispatchers.IO + runCatching
          
          ### 🌍 Website Redesign & SEO Overhaul
          
          * Complete sealplus.in redesign — hero, support CTA, install guide, comparison table, FAQ
          * New support.html (UPI/PayPal/GitHub Sponsors donations)
          * New contact.html (Formspree contact form)
          * Updated sitemap.xml, privacy.html, OG tags
          * Complete CSS rewrite with glassmorphism design system
          
          ---
          
          ### 📦 Installation
          
          Download the appropriate APK for your device:
          - **Universal APK**: Works on all devices (recommended)
          - **arm64-v8a**: For 64-bit ARM devices (most modern phones)
          - **armeabi-v7a**: For 32-bit ARM devices
          - **x86_64**: For 64-bit x86 devices
          - **x86**: For 32-bit x86 devices
          
          ### ✨ Key Features (v2.8)
          - 🎨 **Settings & About Redesign** - Card-based grid layout with chevron navigation
          - 🔌 **Accompanist Removed** - Fully migrated to platform APIs
          - 📦 **Bulk Dependency Update** - Gradle 9.5.1, Kotlin 2.3.21, Compose BOM 2026.05
          - 🐛 **Bug Fixes** - Biometric, memory leaks, crash on finishing activity
          - 🌐 **Website Overhaul** - New pages, SEO, glassmorphism design
          - ⏯️ **Pause/Resume downloads** with queue support
          - 🌐 Download from 1000+ sites via yt-dlp
          
          ### 📜 Full Changelog
          See [CHANGELOG.md](https://github.com/MaheshTechnicals/Sealplus/blob/main/CHANGELOG.md) for complete version history.
          
          ---
          
          Built on: ${{ github.event.head_commit.timestamp }}
          Commit: ${{ github.sha }}
        draft: false
        prerelease: false
        make_latest: true
        files: |
          app/build/outputs/apk/generic/release/*.apk

    - name: Send Telegram Notification to Channel
      if: steps.release_config.outputs.SHOULD_RELEASE == 'true'
      continue-on-error: true
      env:
        TGTOKEN: ${{ secrets.TGTOKEN }}
        TGCHANNEL: ${{ secrets.TGCHANNEL }}
      run: |
        # Skip if Telegram credentials are not configured
        if [ -z "$TGTOKEN" ] || [ -z "$TGCHANNEL" ]; then
          echo "?? Telegram notification skipped (TGTOKEN or TGCHANNEL not configured)"
          exit 0
        fi
        
        echo "? Sending notification to Telegram Channel: $TGCHANNEL"
        
        # Prepare the release URL
        RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.VERSION }}"
        
        # Create a beautiful Telegram message with HTML formatting
        MESSAGE="<b>🎉 New Release Available!</b> 🚀\n\n"
        MESSAGE+="━━━━━━━━━━━━━━━━━━━━━━━\n\n"
        MESSAGE+="📱 <b>App Name:</b> Seal Plus\n\n"
        MESSAGE+="🏷️ <b>Version:</b> v${{ steps.version.outputs.VERSION }}\n\n"
        MESSAGE+="━━━━━━━━━━━━━━━━━━━━━━━\n\n"
        MESSAGE+="📋 <b>Changelog (v2.8):</b>\n\n"
        MESSAGE+="<b>🎨 Settings &amp; About Page Redesign</b>\n"
        MESSAGE+="  ➤ Full-width LazyColumn with PreferenceItem + chevron icons\n"
        MESSAGE+="  ➤ Card-based About page with 2-column CommunityCard grid\n"
        MESSAGE+="  ➤ New Website link to sealplus.in\n"
        MESSAGE+="  ➤ Auto-Update standalone Card toggle\n\n"
        MESSAGE+="<b>🔌 Accompanist → Platform API Migration</b>\n"
        MESSAGE+="  ➤ Permissions replaced with ActivityResultContracts\n"
        MESSAGE+="  ➤ WebView replaced with platform AndroidView\n"
        MESSAGE+="  ➤ Pager indicators replaced with custom Row+Box dots\n"
        MESSAGE+="  ➤ Entire accompanist dependency removed\n\n"
        MESSAGE+="<b>📦 Bulk Dependency Update</b>\n"
        MESSAGE+="  ➤ Gradle 9.5.1 &amp; AGP 9.2.1 (was 8.13 / 8.13.2)\n"
        MESSAGE+="  ➤ Kotlin 2.3.21 with K2 Compiler (was 2.0.21)\n"
        MESSAGE+="  ➤ Compose BOM 2026.05.01 (was 2025.01.00)\n"
        MESSAGE+="  ➤ Coil 3.4.0 — migrated from Coil 2 to Coil 3\n"
        MESSAGE+="  ➤ Android SDK 37 — compileSdk/targetSdk upgraded\n"
        MESSAGE+="  ➤ Room 2.8.4, Koin 4.2.1, MMKV 1.3.16, Coroutines 1.11.0\n\n"
        MESSAGE+="<b>🐛 Bug Fixes &amp; Stability</b>\n"
        MESSAGE+="  ➤ LockScreen biometric prompt — repeated prompt prevention\n"
        MESSAGE+="  ➤ LockScreen deferred until after onboarding completes\n"
        MESSAGE+="  ➤ QuickDownloadActivity — early return crash fix\n"
        MESSAGE+="  ➤ DownloaderV2 network callback cleanup on crash/memory\n"
        MESSAGE+="  ➤ SponsorUtil OkHttpClient leak fix (per-call client)\n"
        MESSAGE+="  ➤ DatabaseUtil destructive migration fallback\n"
        MESSAGE+="  ➤ UpdateUtil checkForUpdate made safe with IO dispatcher\n\n"
        MESSAGE+="<b>🌍 Website Redesign &amp; SEO Overhaul</b>\n"
        MESSAGE+="  ➤ Complete sealplus.in redesign with new sections\n"
        MESSAGE+="  ➤ New support.html (UPI, PayPal, GitHub Sponsors)\n"
        MESSAGE+="  ➤ New contact.html (Formspree form)\n"
        MESSAGE+="  ➤ Updated sitemap, privacy, OG tags, CSS redesign\n\n"
        MESSAGE+="━━━━━━━━━━━━━━━━━━━━━━━\n\n"
        MESSAGE+="✨ <b>Key Features (v2.8):</b>\n"
        MESSAGE+="🎨 Settings &amp; About Redesign — card-based grid with chevron navigation\n"
        MESSAGE+="🔌 Accompanist Removed — fully migrated to platform APIs\n"
        MESSAGE+="📦 Bulk Dependency Update — Gradle 9.5.1, Kotlin 2.3.21, Compose 2026.05\n"
        MESSAGE+="🐛 Bug Fixes — biometric, memory leaks, crash fixes\n"
        MESSAGE+="🌐 Website Overhaul — new pages, SEO, glassmorphism design\n"
        MESSAGE+="⏯️ Pause/Resume with queue — continue interrupted downloads\n"
        MESSAGE+="🌐 1000+ sites via yt-dlp — YouTube, TikTok, Instagram, and more\n\n"
        MESSAGE+="━━━━━━━━━━━━━━━━━━━━━━━\n\n"
        MESSAGE+="📦 <b>Available APKs:</b>\n"
        MESSAGE+="  ➤ Universal (All devices)\n"
        MESSAGE+="  ➤ arm64-v8a (Modern phones)\n"
        MESSAGE+="  ➤ armeabi-v7a (Older phones)\n"
        MESSAGE+="  ➤ x86_64 / x86 (Tablets)\n\n"
        MESSAGE+="━━━━━━━━━━━━━━━━━━━━━━━\n\n"
        MESSAGE+="🔗 <b>Download Now:</b>\n"
        MESSAGE+="<a href=\"${RELEASE_URL}\">Click here to download v${{ steps.version.outputs.VERSION }}</a>\n\n"
        MESSAGE+="━━━━━━━━━━━━━━━━━━━━━━━\n\n"
        MESSAGE+="💡 <b>Note:</b> v2.8 brings a complete Settings &amp; About page redesign, migration from Accompanist to platform APIs, bulk dependency updates (Gradle 9.5.1, Kotlin 2.3.21, Compose BOM 2026.05), critical bug fixes for biometric/crashes/memory leaks, and a full website overhaul with support/contact pages.\n\n"
        MESSAGE+="🕐 <i>Released: $(date '+%B %d, %Y at %H:%M UTC')</i>"
        
        # URL encode the message to avoid HTML parsing issues
        MESSAGE_ENCODED=$(echo -ne "$MESSAGE" | jq -sRr @uri)
        
        # Send ONLY to Channel
        curl -s -X POST "https://api.telegram.org/bot${TGTOKEN}/sendMessage" \
          -d "chat_id=${TGCHANNEL}" \
          -d "text=${MESSAGE_ENCODED}" \
          -d "parse_mode=HTML" \
          -d "disable_web_page_preview=false" \
          && echo "? Telegram Channel notification sent successfully!" \
          || echo "? Failed to send Telegram notification"

    - name: Upload Universal APK as Artifact
      if: steps.release_config.outputs.SHOULD_RELEASE == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: SealPlus-${{ steps.version.outputs.VERSION }}-universal
        path: app/build/outputs/apk/generic/release/*universal*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Upload arm64-v8a APK as Artifact
      if: steps.release_config.outputs.SHOULD_RELEASE == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: SealPlus-${{ steps.version.outputs.VERSION }}-arm64-v8a
        path: app/build/outputs/apk/generic/release/*arm64-v8a*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Upload armeabi-v7a APK as Artifact
      if: steps.release_config.outputs.SHOULD_RELEASE == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: SealPlus-${{ steps.version.outputs.VERSION }}-armeabi-v7a
        path: app/build/outputs/apk/generic/release/*armeabi-v7a*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Upload x86_64 APK as Artifact
      if: steps.release_config.outputs.SHOULD_RELEASE == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: SealPlus-${{ steps.version.outputs.VERSION }}-x86_64
        path: app/build/outputs/apk/generic/release/*x86_64*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Upload x86 APK as Artifact
      if: steps.release_config.outputs.SHOULD_RELEASE == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: SealPlus-${{ steps.version.outputs.VERSION }}-x86
        path: app/build/outputs/apk/generic/release/*x86*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Upload Artifacts (Backup - Always)
      if: steps.release_config.outputs.SHOULD_RELEASE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: signed-apks-backup
        path: app/build/outputs/apk/generic/release/*.apk
        if-no-files-found: error
        retention-days: 20