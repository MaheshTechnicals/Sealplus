stages:
  - build

variables:
  # Gradle ko bata rahe hain ki cache project folder me hi rakhe
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

# --- ? CACHE CONFIGURATION ---
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/wrapper
    - .gradle/caches
    - jdk21/

build_job:
  stage: build
  image: mobiledevops/android-sdk-image:34.0.0-jdk17

  before_script:
    # --- ?? CACHE PERMISSION FIX ---
    # Agar folder nahi hai toh banayega, aur usko full Read/Write permission dega
    - mkdir -p "$CI_PROJECT_DIR/.gradle"
    - chmod -R 777 "$CI_PROJECT_DIR/.gradle"

    # --- ? SMART JAVA INSTALL & CACHE FIX ---
    - |
      if [ ! -d "$CI_PROJECT_DIR/jdk21" ]; then
        echo "? Downloading Java 21 (First Run Only)..."
        curl -L https://download.oracle.com/java/21/latest/jdk-21_linux-x64_bin.tar.gz -o jdk21.tar.gz
        tar -xzf jdk21.tar.gz
        rm jdk21.tar.gz
        
        # Extracted folder ka naam badal kar exactly 'jdk21' kar rahe hain taaki cache save ho sake
        EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "jdk-21*" | head -n 1)
        mv "$EXTRACTED_DIR" jdk21
      else
        echo "? Using Cached Java 21 (Skipping Download)"
      fi
    
    # Setup Java Path
    - export JAVA_HOME="$CI_PROJECT_DIR/jdk21"
    - export PATH="$JAVA_HOME/bin:$PATH"
    
    # --- ? DECODE KEYSTORE ---
    - echo "? Decoding Key..."
    - echo "$ANDROID_SIGNING_KEY" | tr -d '\n\r ' | base64 --decode > "$CI_PROJECT_DIR/Mahesh.jks"

  script:
    # --- STEP 1: EXTRACT VERSION ---
    - |
      VERSION=$(grep -A 1 'val currentVersion: Version =' buildSrc/src/main/kotlin/Version.kt | grep -oP 'versionMajor = \K\d+' | head -1).$(grep -A 1 'val currentVersion: Version =' buildSrc/src/main/kotlin/Version.kt | grep -oP 'versionMinor = \K\d+' | head -1).$(grep -A 1 'val currentVersion: Version =' buildSrc/src/main/kotlin/Version.kt | grep -oP 'versionPatch = \K\d+' | head -1)
      echo "? Building Version: $VERSION"

    # --- STEP 2: FAST BUILD & SIGN ---
    - bash ./gradlew assembleRelease --parallel --build-cache -Pandroid.injected.signing.store.file="$CI_PROJECT_DIR/Mahesh.jks" -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" -Pandroid.injected.signing.key.alias="$ANDROID_ALIAS" -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

    # --- STEP 3: FIND & SAVE ARTIFACTS ---
    - mkdir -p release_output
    - echo "? searching for APKs..."
    - find app/build/outputs -name "*.apk"
    - find app/build/outputs -name "*.apk" -exec cp {} release_output/ \;
    - ls -l release_output/

  artifacts:
    name: "SealPlus-$CI_COMMIT_SHORT_SHA"
    paths:
      - release_output/*.apk
    expire_in: 1 week